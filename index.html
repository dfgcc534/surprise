<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>letter</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/nes.css@latest/css/nes.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">

    <!-- Step 1: 인트로 -->
    <div id="step-1" class="screen">
      <div class="stage">
        <div class="char-wrap">
          <img id="step1-cat" src="assets/me/stand_cat.png" alt="고양이" />
        </div>
      </div>
      <div class="dialog-box">
        <p id="step1-text" class="dialog-text"></p>
        <div id="step1-btns" class="btn-row" style="display:none;">
          <button id="btn-yes" class="nes-btn is-primary">[ Y ]</button>
          <button id="btn-no" class="nes-btn is-error">[ N ]</button>
        </div>
      </div>
    </div>

    <!-- Step 2: 본인 확인 -->
    <div id="step-2" class="screen">
      <div id="step2-normal">
        <div class="stage">
          <div class="char-wrap">
            <img id="step2-cat" src="assets/me/stop_cat.png" alt="고양이" />
          </div>
        </div>
        <div class="dialog-box">
          <p id="step2-text" class="dialog-text"></p>
          <div id="step2-btns" class="btn-row" style="display:none;">
            <button id="btn-quiz" class="nes-btn is-primary">[ 퀴즈를 푼다 ]</button>
            <button id="btn-refuse" class="nes-btn is-error">[ 거절한다 ]</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Step 3: 퀴즈 -->
    <div id="step-3" class="screen">
      <div class="stage">
        <div class="char-wrap">
          <img src="assets/me/IMG_3053.PNG" alt="고양이" />
        </div>
      </div>
      <div class="dialog-box">
        <p id="step3-text" class="dialog-text"></p>
        <div id="step3-btns" class="btn-row" style="display:none;">
          <button id="btn-y" class="nes-btn is-primary">[ Y ]</button>
          <button id="btn-n" class="nes-btn is-error">[ N ]</button>
        </div>
      </div>
    </div>

    <!-- Step 3-F: 퀴즈 실패 -->
    <div id="step-3f" class="screen">
      <div class="stage">
        <div class="char-wrap">
          <img src="assets/me/gun_cat.png" alt="고양이" />
        </div>
      </div>
      <div class="dialog-box">
        <p id="step3f-text" class="dialog-text"></p>
      </div>
    </div>

    <!-- Step 4: 편지 전달 -->
    <div id="step-4" class="screen">
      <div class="stage">
        <div class="char-wrap step4-cat-wrap" id="step4-cat-wrap">
          <img id="step4-cat" src="assets/me/stand_cat.png" alt="고양이" />
          <div id="step4-mail-area" class="step4-mail-area" style="display:none;">
            <img id="step4-mail" src="assets/mail/image copy 3.png" alt="편지" class="step4-mail" />
            <span class="step4-click">CLICK</span>
          </div>
        </div>
      </div>
      <div class="dialog-box">
        <p id="step4-text" class="dialog-text"></p>
      </div>
    </div>

    <!-- Step 5: 악당 등장 -->
    <div id="step-5" class="screen">
      <div class="stage stage-duo">
        <div class="char-wrap step5-cat-wrap">
          <img id="step5-cat" src="assets/me/stand_cat.png" alt="고양이" />
          <img id="step5-mail" src="assets/mail/image copy 3.png" alt="편지" class="step5-mail" />
        </div>
        <div class="char-wrap villain-wrap" id="step5-villain" style="display:none;">
          <img src="assets/bad/제목 없음 (6).png" alt="악당" />
        </div>
      </div>
      <div class="dialog-box">
        <p id="step5-text" class="dialog-text"></p>
      </div>
    </div>

    <!-- Step 6: 가윤이 등장 -->
    <div id="step-6" class="screen">
      <div class="stage stage-duo">
        <div class="char-wrap">
          <img id="step6-cat" src="assets/me/IMG_3052.PNG" alt="고양이" />
        </div>
        <div class="char-wrap" id="step6-you-wrap" style="display:none;">
          <img id="step6-you" src="assets/you/image.png" alt="가윤이" />
        </div>
      </div>
      <div class="dialog-box">
        <p id="step6-text" class="dialog-text"></p>
        <div id="step6-btns" class="btn-row" style="display:none;">
          <button id="btn-go" class="nes-btn is-primary">[ 출발! ]</button>
        </div>
      </div>
    </div>

    <!-- Step 7: 런 게임 -->
    <div id="step-7" class="screen">
      <canvas id="run-canvas"></canvas>
      <div id="run-hud">
        <div id="run-hearts"></div>
        <div id="run-progress-bar"><div id="run-progress-fill"></div></div>
      </div>
      <div id="run-controls">
        <span class="key-hint">&larr;</span> 슬라이딩
        <span class="key-sep">|</span>
        <span class="key-hint">&rarr;</span> 점프
      </div>
    </div>

    <!-- Step 8: 편지 탈환 + 축하 -->
    <div id="step-8" class="screen">
      <div class="stage stage-duo">
        <div class="char-wrap">
          <img src="assets/me/stand_cat.png" alt="고양이" />
        </div>
        <div class="char-wrap letter-char">
          <img src="assets/mail/image copy 3.png" alt="편지" class="letter-img bounce" />
        </div>
        <div class="char-wrap">
          <img src="assets/you/image copy.png" alt="가윤이" />
        </div>
      </div>
      <div class="dialog-box">
        <p id="step8-text" class="dialog-text"></p>
        <div id="step8-btns" class="btn-row" style="display:none;">
          <button id="btn-open" class="nes-btn is-primary">[ 다음 ]</button>
        </div>
      </div>
    </div>

    <!-- Step 9: 편지 오픈 엔딩 -->
    <div id="step-9" class="screen">
      <div id="step9-top" class="stage stage-duo">
        <div class="char-wrap">
          <img src="assets/me/Untitled (1).png" alt="고양이" />
        </div>
        <div id="step9-letter-wrap" class="char-wrap letter-char">
          <img id="step9-mail" src="assets/mail/image copy 3.png" alt="편지" class="letter-img" />
          <span id="step9-click" class="letter-click">CLICK</span>
        </div>
      </div>
      <div id="step9-paper" style="display:none;">
        <img src="assets/mail/제목 없음 (13).png" alt="편지지" class="paper-bg" />
        <p id="step9-text" class="paper-text"></p>
      </div>
      <div id="step9-finale" style="display:none;"></div>
    </div>

    <!-- 게임오버 오버레이 -->
    <div id="gameover-overlay" class="gameover-wrap" style="display:none;">
      <p id="go-text" class="go-narration"></p>
      <p id="go-title" class="go-title blink" style="display:none;">GAME OVER</p>
    </div>

  </div>

  <script src="utils.js"></script>
  <script src="steps/step1.js"></script>
  <script src="steps/step2.js"></script>
  <script src="steps/step3.js"></script>
  <script src="steps/step4.js"></script>
  <script src="steps/step5.js"></script>
  <script src="steps/step6.js"></script>
  <script src="steps/step7.js"></script>
  <script src="steps/step8.js"></script>
  <script src="steps/step9.js"></script>
  <script src="main.js"></script>
</body>
</html>
